version = 1

[settings]
target_profile = "multi-runtime-default"
write_codex_agent_alias = true

[[installs]]
id = "github:AxiomOrient/composable-skills@default#root"
targets = ["codex"]

[installs.source]
kind = "github"
owner = "AxiomOrient"
repo = "composable-skills"

[installs.selection]
all = false
decks = ["workflow", "debug", "build"]
skills = []
exclude_skills = ["gemini"]
agent_file_templates = ["codex"]

[[installs]]
id = "github:garrytan/gstack@default#root"
targets = ["claude"]

[installs.source]
kind = "github"
owner = "garrytan"
repo = "gstack"

[installs.selection]
all = false
decks = ["workflow"]
skills = ["browse"]
exclude_skills = []
agent_file_templates = ["claude-root"]
